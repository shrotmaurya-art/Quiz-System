<style>
        .radial-bg {
            background: radial-gradient(circle at center, rgba(35, 0, 163, 0.4) 0%, rgba(10, 14, 41, 0.9) 60%, #0e141a 100%);
        }
        .light-beams {
            background: conic-gradient(from 0deg at 50% 50%, 
                transparent 0deg, 
                rgba(240, 192, 62, 0.05) 45deg, 
                transparent 90deg, 
                rgba(240, 192, 62, 0.05) 135deg, 
                transparent 180deg, 
                rgba(240, 192, 62, 0.05) 225deg, 
                transparent 270deg, 
                rgba(240, 192, 62, 0.05) 315deg, 
                transparent 360deg);
            animation: rotate-beams 60s linear infinite;
        }
        @keyframes rotate-beams {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .gold-glow {
            box-shadow: 0 0 30px rgba(240, 192, 62, 0.5), inset 0 0 15px rgba(240, 192, 62, 0.3);
        }
        .pulse-text {
            animation: pulse-opacity 2s ease-in-out infinite;
        }
        @keyframes pulse-opacity {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(240, 192, 62, 0.4); }
        }
        
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: sparkle-anim 3s ease-in-out infinite;
        }
        @keyframes sparkle-anim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; transform: scale(1); box-shadow: 0 0 8px rgba(240, 192, 62, 0.8); }
        }

<span class="w-2 h-2 rounded-full bg-[#4ade80] shadow-[0_0_8px_#4ade80] animate-pulse"></span>

<span class="font-display-lg text-headline-md font-black tracking-tighter text-secondary">
            THE HOT SEAT
        </span>

<script>
        // Generate Sparkles
        const container = document.getElementById('sparkles-container');
        const numSparkles = 30;

        for (let i = 0; i < numSparkles; i++) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            
            // Random positioning
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            
            // Random sizing (1px to 4px)
            const size = Math.random() * 3 + 1;
            
            // Random animation delay and duration to make it look organic
            const delay = Math.random() * 5;
            const duration = Math.random() * 3 + 2;

            sparkle.style.left = `${left}%`;
            sparkle.style.top = `${top}%`;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.animationDelay = `${delay}s`;
            sparkle.style.animationDuration = `${duration}s`;

            // Randomly color some sparkles gold
            if(Math.random() > 0.7) {
                sparkle.style.background = '#f0c03e';
            }

            container.appendChild(sparkle);
        }
    </script>
