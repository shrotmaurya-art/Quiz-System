<style>
        @keyframes pulse-glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(240, 192, 62, 0.5), 0 0 40px rgba(240, 192, 62, 0.3);
                filter: drop-shadow(0 0 15px rgba(240, 192, 62, 0.6));
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 40px rgba(240, 192, 62, 0.9), 0 0 80px rgba(240, 192, 62, 0.7);
                filter: drop-shadow(0 0 30px rgba(240, 192, 62, 0.9));
                transform: scale(1.05);
            }
        }

        .animate-suspense-pulse {
            animation: pulse-glow 2s infinite ease-in-out;
        }
        
        .luminous-text {
            background: linear-gradient(to bottom, #ffdf95, #f0c03e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>

<body class="bg-background text-on-background overflow-hidden font-body-md h-screen w-screen flex flex-col justify-center items-center relative">
<!-- Background Shader -->

<!-- Deep Radial Vignette Overlay for Stage Focus -->
<div class="absolute inset-0 bg-radial-gradient from-transparent via-background/50 to-background z-0 pointer-events-none" style="background: radial-gradient(circle at center, transparent 0%, rgba(14, 20, 26, 0.8) 70%, #0e141a 100%);"></div>
<!-- Central Focus Container -->
<main class="relative z-10 flex flex-col items-center justify-center text-center p-gutter max-w-container-max mx-auto h-full w-full">
<!-- Countdown -->
<div class="mb-stack-lg animate-suspense-pulse">
<span class="font-display-lg text-[120px] leading-none tracking-tighter luminous-text drop-shadow-[0_0_30px_rgba(240,192,62,0.8)]">
                3
            </span>
</div>
<!-- Ornate Padlock Icon -->
<div class="mb-stack-lg animate-suspense-pulse">
<span class="material-symbols-outlined text-[150px] text-secondary drop-shadow-[0_0_50px_rgba(240,192,62,1)]" style="font-variation-settings: 'FILL' 1, 'wght' 200;">
                lock
            </span>
</div>
<!-- Theatrical Text -->
<div class="animate-suspense-pulse" style="animation-delay: 0.2s;">
<h1 class="font-display-lg text-display-lg tracking-wide uppercase text-secondary drop-shadow-[0_0_20px_rgba(240,192,62,0.6)]">
                Answer Locking In...
            </h1>
</div>
</main>
<!-- Interactive Elements (Optional, for demo purposes) -->
<script>
        // Simple countdown logic for visual effect, though requirement asked for static "3" pulsing.
        // Adding subtle interaction if a user clicks anywhere to simulate a lock.
        document.body.addEventListener('click', () => {
            const countdownEl = document.querySelector('.luminous-text');
            let count = parseInt(countdownEl.innerText);
            if(count > 1) {
                countdownEl.innerText = count - 1;
            } else if (count === 1) {
                countdownEl.innerText = "LOCKED";
                countdownEl.classList.remove('text-[120px]');
                countdownEl.classList.add('text-[80px]', 'text-error');
                countdownEl.style.background = 'linear-gradient(to bottom, #ffb4ab, #93000a)';
                countdownEl.style.webkitBackgroundClip = 'text';
                
                const icon = document.querySelector('.material-symbols-outlined');
                icon.innerText = 'lock_clock';
                icon.classList.remove('text-secondary', 'drop-shadow-[0_0_50px_rgba(240,192,62,1)]');
                icon.classList.add('text-error', 'drop-shadow-[0_0_50px_rgba(255,180,171,1)]');
                
                document.querySelector('h1').innerText = "FINAL ANSWER";
                document.querySelector('h1').classList.remove('text-secondary');
                document.querySelector('h1').classList.add('text-error');
            }
        });
    </script>
