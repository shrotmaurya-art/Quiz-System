<style>

            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
        }

            box-shadow: inset 0 0 20px rgba(240, 192, 62, 0.4), 0 0 30px rgba(240, 192, 62, 0.2);

            background: radial-gradient(circle at center, #151935 0%, #080f14 80%);

        .timer-circle {
            stroke-dasharray: 283;
            stroke-dashoffset: 80;
            transition: stroke-dashoffset 1s linear;

    body {

<body class="bg-surface-dim text-on-surface min-h-screen overflow-hidden flex flex-col items-center justify-center radial-bg">
<!-- Ambient Spotlights -->
<div class="fixed top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-tertiary-fixed/5 blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-fixed/5 blur-[120px] pointer-events-none"></div>
<!-- Top App Bar Shell Context (Hidden intent: rapid fire task screen) -->
<header class="fixed top-0 w-full bg-surface-dim/80 backdrop-blur-xl border-b border-secondary/30 shadow-[0_4px_30px_rgba(0,0,0,0.5)] z-50 flex justify-between items-center px-margin-desktop h-20 w-full hidden md:flex">
<button class="text-secondary hover:bg-secondary/10 hover:text-secondary-fixed transition-all duration-300 active:scale-95 duration-150 p-2 rounded-full">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline-md text-headline-md uppercase tracking-widest text-secondary drop-shadow-[0_0_10px_rgba(240,192,62,0.5)]">QUIZ SHOW LIVE</h1>
<button class="text-secondary hover:bg-secondary/10 hover:text-secondary-fixed transition-all duration-300 active:scale-95 duration-150 p-2 rounded-full">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop flex flex-col items-center justify-center flex-1 relative z-10 pt-24 md:pt-32 pb-24">
<!-- Timer -->
<div class="relative w-32 h-32 md:w-40 md:h-40 mb-stack-lg flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="#2f353c" stroke-width="4"></circle>
<circle class="timer-circle" cx="50" cy="50" fill="none" r="45" stroke="#f0c03e" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-secondary drop-shadow-[0_0_15px_rgba(240,192,62,0.8)]">14</span>
</div>
</div>
<!-- Question Text -->
<div class="text-center mb-stack-lg md:mb-margin-desktop max-w-3xl">
<h2 class="font-headline-md text-headline-md md:text-display-lg-mobile text-on-surface">Which element has the atomic number 79?</h2>
</div>
<!-- Answer Options (Hidden/Replaced by Lock Button in this specific prompt context, but showing a locked choice context if needed, opting to just show the large lock button as requested) -->
<!-- Central Locked Button -->
<div class="w-full max-w-xl">
<button class="w-full relative hex-clip bg-secondary text-on-secondary-fixed font-headline-md text-headline-md py-6 px-12 transition-all duration-300 scale-95 opacity-100 flex items-center justify-center gap-4 glow-secondary cursor-not-allowed" disabled="">
<span class="material-symbols-outlined fill text-3xl">lock</span>
                LOCKED <span class="material-symbols-outlined font-bold text-3xl">check</span>
</button>
</div>
</main>
<!-- Bottom Nav Shell Context (Hidden on this transactional task screen) -->

<button class="flex flex-col items-center justify-center text-on-surface-variant/70 px-6 py-2 hover:text-secondary hover:bg-secondary/5 transition-colors active:scale-90 duration-200">

<span class="font-label-caps text-label-caps">LEAVE</span>
</button>

<script>
        // Simple script to simulate timer running down visually in the locked state
        document.addEventListener("DOMContentLoaded", () => {
            const timerCircle = document.querySelector('.timer-circle');
            let offset = 80; // Starting offset
            
            setInterval(() => {
                if(offset < 283) {
                    offset += 2;
                    timerCircle.style.strokeDashoffset = offset;
                }
            }, 100);
        });
    </script>
