<script>
        // Simple Particle System for Ambient Background
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('particles-container');
            const particleCount = 30; // Fewer particles for a subtle effect

            for (let i = 0; i < particleCount; i++) {
                createParticle();
            }

            function createParticle() {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Randomize properties
                const size = Math.random() * 4 + 1 + 'px';
                const left = Math.random() * 100 + 'vw';
                const top = Math.random() * 100 + 'vh';
                const animationDuration = Math.random() * 5 + 3 + 's';
                const animationDelay = Math.random() * 5 + 's';

                particle.style.width = size;
                particle.style.height = size;
                particle.style.left = left;
                particle.style.top = top;
                particle.style.animationDuration = animationDuration;
                particle.style.animationDelay = animationDelay;

                // Muted red/gold colors for particles based on theme
                const colors = ['rgba(147, 0, 10, 0.4)', 'rgba(240, 192, 62, 0.3)', 'rgba(255, 255, 255, 0.2)'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];

                container.appendChild(particle);

                // Recreate particle after animation ends to keep them flowing
                setTimeout(() => {
                    particle.remove();
                    createParticle();
                }, (parseFloat(animationDuration) + parseFloat(animationDelay)) * 1000);
            }
        });
    </script>
