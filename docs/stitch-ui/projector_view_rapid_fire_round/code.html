<style>
        .bloom-shadow {
            box-shadow: 0 0 30px rgba(240, 192, 62, 0.4), inset 0 0 15px rgba(240, 192, 62, 0.3);
        }
        .bloom-shadow-purple {
            box-shadow: 0 0 40px rgba(114, 104, 249, 0.5), inset 0 0 20px rgba(114, 104, 249, 0.4);
        }
        .clip-diamond {
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
        }
        .clip-hex {
            clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%);
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(240, 192, 62, 0.4), inset 0 0 15px rgba(240, 192, 62, 0.3); }
            50% { box-shadow: 0 0 50px rgba(240, 192, 62, 0.7), inset 0 0 25px rgba(240, 192, 62, 0.5); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s infinite;
        }

        @keyframes lightning {
            0% { text-shadow: 0 0 10px #7268f9; }
            10% { text-shadow: 0 0 20px #7268f9, 0 0 40px #fff; }
            20% { text-shadow: 0 0 10px #7268f9; }
            30% { text-shadow: 0 0 30px #7268f9, 0 0 50px #fff; }
            40% { text-shadow: 0 0 10px #7268f9; }
            100% { text-shadow: 0 0 10px #7268f9; }
        }
        .animate-lightning {
            animation: lightning 3s infinite;
        }

        @keyframes spark {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            50% { opacity: 1; transform: translateY(-20px) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(0); }
        }
        .spark {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
            animation: spark 1s linear infinite;
        }

        .timer-ring {
            stroke-dasharray: 283;
            stroke-dashoffset: 0;
            animation: timer-drain 10s linear forwards;
        }
        @keyframes timer-drain {
            0% { stroke-dashoffset: 0; stroke: #f0c03e; }
            80% { stroke: #f0c03e; }
            100% { stroke-dashoffset: 283; stroke: #ffb4ab; }
        }
        @keyframes pulse-timer {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-timer {
            animation: pulse-timer 1s infinite;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen overflow-hidden flex flex-col items-center justify-center relative font-body-md select-none">
<!-- Background Shader -->

<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-label-caps text-label-caps text-secondary tracking-widest">RAPID FIRE ROUND · Q7 OF 10</span>
</div>
</div>
<!-- Top Right: Countdown Timer -->
<div class="absolute top-margin-desktop right-margin-desktop z-20 animate-timer">
<div class="relative w-24 h-24 flex items-center justify-center bg-surface-container/50 backdrop-blur-md rounded-full shadow-[inset_0_0_20px_rgba(240,192,62,0.2)]">
<svg class="absolute inset-0 w-full h-full -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="rgba(47, 53, 60, 0.5)" stroke-width="6"></circle>
<circle class="timer-ring drop-shadow-[0_0_8px_rgba(240,192,62,0.8)]" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-width="6"></circle>
</svg>
<span class="font-display-lg text-display-lg text-white font-black drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">08</span>
</div>
</div>
<!-- Main Content Area: Question Card -->
<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-container-max px-margin-desktop mt-16">
<!-- Question Card -->
<div class="w-full max-w-4xl bg-surface-container-low/80 backdrop-blur-2xl border-t-4 border-b-4 border-secondary p-12 rounded-lg bloom-shadow text-center relative overflow-hidden">
<!-- Light beam reflections -->
<div class="absolute top-0 left-1/4 w-1/2 h-1 bg-gradient-to-r from-transparent via-white/50 to-transparent blur-[2px]"></div>
<div class="absolute bottom-0 left-1/3 w-1/3 h-1 bg-gradient-to-r from-transparent via-white/50 to-transparent blur-[2px]"></div>

                In computational complexity theory, which class of problems is characterized by the existence of a non-deterministic Turing machine that can solve it in polynomial time?
            </h1>
</div>

<div class="font-display-lg text-[36px] font-black tracking-widest text-white animate-lightning flex items-center gap-4">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
                    RAPID FIRE
                    <span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</div>
</div>
