<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quiz Show - Personal Results</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@100..900&family=Space+Grotesk:wght@100..900&family=Work+Sans:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#595c7b",
                        "secondary": "#f0c03e",
                        "primary-container": "#0a0e29",
                        "on-primary-container": "#777a9b",
                        "outline": "#919098",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#594400",
                        "tertiary-fixed": "#e3dfff",
                        "on-tertiary-fixed": "#130068",
                        "outline-variant": "#46464d",
                        "tertiary-fixed-dim": "#c4c0ff",
                        "surface-dim": "#0e141a",
                        "on-background": "#dde3eb",
                        "surface-variant": "#2f353c",
                        "surface-container": "#1a2026",
                        "surface": "#0e141a",
                        "surface-container-lowest": "#080f14",
                        "secondary-container": "#ba9000",
                        "background": "#0e141a",
                        "primary-fixed": "#dfe0ff",
                        "surface-bright": "#333a40",
                        "on-surface-variant": "#c7c5ce",
                        "primary": "#c1c4e8",
                        "inverse-surface": "#dde3eb",
                        "primary-fixed-dim": "#c1c4e8",
                        "inverse-on-surface": "#2b3137",
                        "on-secondary-fixed": "#251a00",
                        "on-error": "#690005",
                        "surface-container-high": "#242b31",
                        "on-primary-fixed": "#151935",
                        "error": "#ffb4ab",
                        "on-secondary": "#3e2e00",
                        "tertiary": "#c4c0ff",
                        "secondary-fixed": "#ffdf95",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#161c22",
                        "surface-container-highest": "#2f353c",
                        "surface-tint": "#c1c4e8",
                        "on-tertiary-container": "#7268f9",
                        "on-secondary-container": "#3c2c00",
                        "tertiary-container": "#0a0049",
                        "on-tertiary-fixed-variant": "#3a28c0",
                        "on-tertiary": "#2300a3",
                        "on-primary": "#2b2e4b",
                        "on-primary-fixed-variant": "#414562",
                        "on-surface": "#dde3eb",
                        "secondary-fixed-dim": "#f0c03e"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "margin-mobile": "16px",
                        "container-max": "1200px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "margin-desktop": "64px",
                        "gutter": "24px",
                        "stack-md": "16px"
                    },
                    fontFamily: {
                        "display-lg-mobile": ["Playfair Display"],
                        "display-lg": ["Playfair Display"],
                        "label-caps": ["Space Grotesk"],
                        "headline-md": ["Playfair Display"],
                        "body-lg": ["Work Sans"],
                        "body-md": ["Work Sans"]
                    },
                    fontSize: {
                        "display-lg-mobile": ["32px", { lineHeight: "1.2", fontWeight: "900" }],
                        "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "0.02em", fontWeight: "900" }],
                        "label-caps": ["14px", { lineHeight: "1.2", letterSpacing: "0.1em", fontWeight: "600" }],
                        "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "700" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .clip-hexagon {
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
        }
        
        .glow-gold {
            box-shadow: inset 0 0 20px rgba(240, 192, 62, 0.4), 0 0 30px rgba(240, 192, 62, 0.2);
        }
        
        .glow-red {
            box-shadow: inset 0 0 20px rgba(255, 180, 171, 0.3), 0 0 20px rgba(255, 180, 171, 0.1);
        }
        
        .glow-green {
            box-shadow: inset 0 0 20px rgba(163, 222, 190, 0.4), 0 0 30px rgba(163, 222, 190, 0.2);
        }
        
        .bg-radial-theatrical {
            background: radial-gradient(circle at 50% 40%, rgba(36, 43, 49, 0.8) 0%, rgba(14, 20, 26, 1) 70%);
        }
        
        .particles-overlay {
            background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen overflow-x-hidden font-body-md select-none">
<!-- Global Nav (TopAppBar from JSON) -->
<header class="fixed top-0 w-full bg-surface-dim/80 backdrop-blur-xl border-b border-secondary/30 shadow-[0_4px_30px_rgba(0,0,0,0.5)] flex justify-between items-center px-margin-mobile md:px-margin-desktop h-20 z-50">
<button class="text-on-surface-variant hover:bg-secondary/10 hover:text-secondary-fixed transition-all duration-300 active:scale-95 duration-150 p-2 rounded-full">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline-md text-headline-md uppercase tracking-widest text-secondary drop-shadow-[0_0_10px_rgba(240,192,62,0.5)]">
            QUIZ SHOW LIVE
        </h1>
<button class="text-on-surface-variant hover:bg-secondary/10 hover:text-secondary-fixed transition-all duration-300 active:scale-95 duration-150 p-2 rounded-full">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 min-h-screen bg-radial-theatrical flex flex-col items-center justify-center relative px-margin-mobile">
<!-- Ambient Particles -->
<div class="absolute inset-0 particles-overlay opacity-30 pointer-events-none mix-blend-screen"></div>
<!-- State Tabs (For Demonstration Purposes) -->
<div class="absolute top-28 z-40 flex gap-4">
<button class="px-4 py-1 text-xs font-label-caps text-label-caps bg-surface-variant border border-secondary/50 rounded-full text-secondary hover:bg-secondary/20 transition" onclick="switchState('winner')">Winner</button>
<button class="px-4 py-1 text-xs font-label-caps text-label-caps bg-surface-variant border border-outline rounded-full text-on-surface hover:bg-surface-bright transition" onclick="switchState('correct')">Correct</button>
<button class="px-4 py-1 text-xs font-label-caps text-label-caps bg-surface-variant border border-outline rounded-full text-on-surface hover:bg-surface-bright transition" onclick="switchState('incorrect')">Incorrect</button>
</div>
<!-- The Result Container (Hexagon/Diamond Structure) -->
<div class="relative w-full max-w-md mt-12 transition-all duration-500 ease-in-out" id="resultCard">
<!-- State 1: WINNER -->
<div class="flex flex-col items-center justify-center relative w-full opacity-100 scale-100 transition-all duration-500 absolute inset-0" id="stateWinner">
<!-- Radiant Glow Behind -->
<div class="absolute w-64 h-64 bg-secondary/20 rounded-full blur-[80px] -z-10"></div>
<!-- Trophy Icon -->
<div class="w-24 h-24 mb-6 rounded-full bg-secondary-container flex items-center justify-center ring-2 ring-secondary glow-gold">
<span class="material-symbols-outlined text-[48px] text-on-secondary-fixed" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
</div>
<h2 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-secondary text-center drop-shadow-[0_0_15px_rgba(240,192,62,0.6)] mb-2">
                    You won this round! 🏆
                </h2>
<div class="mt-8 clip-hexagon bg-surface-container-high/80 backdrop-blur-xl border-y-2 border-secondary px-12 py-6 flex flex-col items-center w-full glow-gold">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-2">RESPONSE TIME</span>
<span class="font-headline-md text-headline-md text-white font-mono">0.84s</span>
</div>
</div>
<!-- State 2: CORRECT (Hidden by default) -->
<div class="flex flex-col items-center justify-center relative w-full opacity-0 scale-95 pointer-events-none transition-all duration-500 absolute inset-0 hidden" id="stateCorrect">
<!-- Subtle Glow Behind -->
<div class="absolute w-48 h-48 bg-[#a3debe]/20 rounded-full blur-[60px] -z-10"></div>
<div class="w-20 h-20 mb-6 rounded-full bg-surface-container-highest flex items-center justify-center ring-1 ring-[#a3debe]/50 glow-green">
<span class="material-symbols-outlined text-[40px] text-[#a3debe]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-secondary text-center mb-2">
                    Correct!
                </h2>
<div class="mt-8 clip-hexagon bg-surface-container-high/60 backdrop-blur-xl border-y border-[#a3debe]/50 px-12 py-6 flex flex-col items-center w-full">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-2">RESPONSE TIME</span>
<span class="font-headline-md text-headline-md text-white font-mono">1.24s</span>
</div>
</div>
<!-- State 3: INCORRECT (Hidden by default) -->
<div class="flex flex-col items-center justify-center relative w-full opacity-0 scale-95 pointer-events-none transition-all duration-500 absolute inset-0 hidden" id="stateIncorrect">
<div class="absolute w-48 h-48 bg-error/10 rounded-full blur-[60px] -z-10"></div>
<div class="w-20 h-20 mb-6 rounded-full bg-surface-container flex items-center justify-center ring-1 ring-error/30 glow-red">
<span class="material-symbols-outlined text-[40px] text-error" style="font-variation-settings: 'FILL' 1;">cancel</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface text-center mb-2 opacity-80">
                    Better luck next round
                </h2>
<div class="mt-8 clip-hexagon bg-surface-container-high/40 backdrop-blur-xl border-y border-error/30 px-8 py-6 flex flex-col items-center w-full text-center">
<span class="font-label-caps text-label-caps text-error mb-2">CORRECT ANSWER WAS</span>
<span class="font-body-lg text-body-lg text-white">C) The Mariana Trench</span>
</div>
</div>
</div>
</main>
<!-- Bottom Nav Bar (From JSON - Used on Mobile/Tablet usually) -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-surface-dim/90 backdrop-blur-2xl border-t border-secondary/20 shadow-[0_-10px_40px_rgba(0,0,0,0.8)] flex justify-around items-center px-margin-mobile md:px-margin-desktop py-4 md:hidden">
<!-- Inactive: Lifelines -->
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 px-4 py-2 hover:text-secondary hover:bg-secondary/5 transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1">bolt</span>
<span class="font-label-caps text-[10px] tracking-widest">LIFELINES</span>
</button>
<!-- Active: Audience (Semantically mapping to 'Stats/Results' for this view) -->
<button class="flex flex-col items-center justify-center bg-secondary/20 text-secondary rounded-xl px-4 py-2 ring-1 ring-secondary/50 shadow-[0_0_15px_rgba(240,192,62,0.3)] active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">leaderboard</span>
<span class="font-label-caps text-[10px] tracking-widest text-secondary">STATS</span>
</button>
<!-- Inactive: Leave -->
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 px-4 py-2 hover:text-secondary hover:bg-secondary/5 transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1">logout</span>
<span class="font-label-caps text-[10px] tracking-widest">LEAVE</span>
</button>
</nav>
<script>
        function switchState(state) {
            const winner = document.getElementById('stateWinner');
            const correct = document.getElementById('stateCorrect');
            const incorrect = document.getElementById('stateIncorrect');

            // Reset all classes
            [winner, correct, incorrect].forEach(el => {
                el.classList.remove('opacity-100', 'scale-100');
                el.classList.add('opacity-0', 'scale-95', 'pointer-events-none', 'hidden');
            });

            // Set active state classes
            let activeEl;
            if (state === 'winner') activeEl = winner;
            if (state === 'correct') activeEl = correct;
            if (state === 'incorrect') activeEl = incorrect;

            if (activeEl) {
                activeEl.classList.remove('hidden');
                // slight delay to allow display:block to apply before animating opacity
                setTimeout(() => {
                    activeEl.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                    activeEl.classList.add('opacity-100', 'scale-100');
                }, 10);
            }
        }
    </script>
</body></html>
